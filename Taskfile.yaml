version: "3"

vars:
  GREETING: Galactic Astrophysics
  VENV_BIN: .venv/bin

tasks:
  default:
    cmds:
      - echo "{{.GREETING}}"
    silent: true

  test:
    desc: "Run the tests"
    cmds:
      - "{{.VENV_BIN}}/python -m unittest discover -s tests"

  test:verbose:
    desc: "Run tests with detailed output and exposed print statements"
    cmds:
      - "{{.VENV_BIN}}/python -m unittest discover -s tests -v"

  run:
    cmds:
      - "{{.VENV_BIN}}/galactic_dynamics"